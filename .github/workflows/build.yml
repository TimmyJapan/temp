name: MSYS2 x86 Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW32  # Switch to MINGW32 to get 32-bit libs
          install: >-
            base-devel
            mingw-w64-i686-gcc
            make
          update: true

      - name: Build project
        run: |
          cd ido-static-recomp
          # Tell the Makefile to use the i686 compiler instead of the 64-bit one
          export CC=i686-w64-mingw32-gcc
          export CXX=i686-w64-mingw32-g++
          
          make clean || true
          make setup -j$(nproc)
          make -j$(nproc)

      - name: Check Architecture
        run: |
          file ido-static-recomp/build/out/cc

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: full-build-output-x86
          path: .
          retention-days: 5