name: MSYS2 x86 Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MSYS
          # We need the 32-bit runtime and the cross-compiler 
          # that understands the MSYS/Cygwin environment.
          install: >-
            base-devel
            make
          update: true

      - name: Build project
        run: |
          # Manually install the 32-bit MSYS compiler and runtime
          # Note: 'gcc-libs-i686' and 'msys2-runtime-devel' provide the 32-bit libs
          pacman -S --noconfirm msys2-runtime-devel gcc-libs-i686
          
          cd ido-static-recomp
          
          # Force the use of the 32-bit flags and point to the 32-bit lib folder
          export CFLAGS="-m32 -march=i686"
          export CXXFLAGS="-m32 -march=i686"
          export LDFLAGS="-m32 -static"
          
          # This tells the linker to look in the i686-specific folder for libm, libgcc, etc.
          export LIBRARY_PATH="/usr/lib/i686-pc-msys:/usr/lib"

          make clean || true
          make setup -j$(nproc)
          make -j$(nproc)
          
      - name: Check Architecture
        run: |
          file ido-static-recomp/build/out/cc

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: full-build-output-x86
          path: .
          retention-days: 5