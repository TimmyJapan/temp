name: MSYS2 x86 Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MSYS
          install: >-
            base-devel
            gcc
            make
            msys2-runtime-devel
            libcrypt-devel
            libiconv-devel
            gettext-devel
          update: true

      - name: Build project
        run: |
          cd ido-static-recomp
          make clean || true
          make setup -j$(nproc)
          make -j$(nproc)

      - name: Check Architecture
        run: |
          file ido-static-recomp/build/out/cc

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: full-build-output-x86
          path: .
          retention-days: 5