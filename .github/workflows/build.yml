name: MSYS2 x86 Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MSYS
          # We are adding msys2-runtime-devel and the cross-compiler 
          # to get the 32-bit static libs that 'ld' is missing.
          install: >-
            base-devel
            gcc
            make
            msys2-runtime-devel
          update: true

      - name: Build project
        run: |
          cd ido-static-recomp
          
          # 1. Force the compiler to 32-bit
          export CFLAGS="-m32 -march=i686"
          export CXXFLAGS="-m32 -march=i686"
          export LDFLAGS="-m32 -static"
          
          # 2. THE SECRET SAUCE: 
          # We tell the linker exactly where the 32-bit MSYS libs are.
          # On GitHub runners, these are often in /usr/lib/i686-pc-msys
          export LIBRARY_PATH="/usr/lib/i686-pc-msys:/usr/lib"
          
          make clean || true
          make setup -j$(nproc)
          make -j$(nproc)
          
      - name: Check Architecture
        run: |
          file ido-static-recomp/build/out/cc

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: full-build-output-x86
          path: .
          retention-days: 5